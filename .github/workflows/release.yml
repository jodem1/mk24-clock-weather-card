name: Release

# Publishes dist/mk24-clock-weather-card.js to the GitHub Release that triggered this run.
# (Optional for HACS default listing: enable Issues + add topics — see https://hacs.xyz/docs/publish/include )

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install and build
        run: |
          yarn install
          yarn build

      - name: Upload mk24-clock-weather-card.js to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          gh release upload "${{ github.ref_name }}" mk24-clock-weather-card.js \
            --clobber --repo "${{ github.repository }}"
